<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Prospecção</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#DAD7CF;--surface:#E5E2DA;--surface2:#CFCBC2;--surface3:#C4C0B7;
  --text:#1C1917;--text2:#6E6862;--text3:#8C857D;
  --border:#C0BCB3;--border2:#A8A49B;
  --accent:#E30613;--accent-fg:#FFFFFF;--accent-dark:#B30410;--brand-black:#1A1A1A;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-mid:#BFDBFE;--blue-light:#DBEAFE;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-mid:#FDE68A;
  --green:#16A34A;--green-bg:#F0FDF4;--green-mid:#BBF7D0;
  --red:#DC2626;--red-bg:#FEF2F2;--red-mid:#FECACA;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-mid:#DDD6FE;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow:0 1px 2px rgba(0,0,0,0.04),0 1px 1px rgba(0,0,0,0.025);
  --shadow-md:0 3px 12px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.035);
  --shadow-lg:0 18px 36px rgba(0,0,0,0.10),0 6px 14px rgba(0,0,0,0.05);
  --topbar-h:68px;
}
html.dark{
  --bg:#111110;--surface:#1A1917;--surface2:#222120;--surface3:#2A2927;
  --text:#F5F3EF;--text2:#9C968F;--text3:#655F59;
  --border:#2A2824;--border2:#38342E;
  --accent:#EF3340;--accent-fg:#FFFFFF;--accent-dark:#C42029;--brand-black:#F5F3EF;
  --blue:#3B82F6;--blue-bg:#1A2A44;--blue-mid:#1E3A5F;--blue-light:#162338;
  --amber:#F59E0B;--amber-bg:#281F00;--amber-mid:#3D2E00;
  --green:#22C55E;--green-bg:#0C2416;--green-mid:#14391F;
  --red:#F87171;--red-bg:#280C0C;--red-mid:#3D1010;
  --purple:#A78BFA;--purple-bg:#1C1038;--purple-mid:#2D1A5C;
}
html.dark *{font-weight:400}
@media(prefers-color-scheme:dark){html:not(.light){
  --bg:#111110;--surface:#1A1917;--surface2:#222120;--surface3:#2A2927;
  --text:#F5F3EF;--text2:#9C968F;--text3:#655F59;
  --border:#2A2824;--border2:#38342E;
  --accent:#EF3340;--accent-fg:#FFFFFF;--accent-dark:#C42029;--brand-black:#F5F3EF;
  --blue:#3B82F6;--blue-bg:#1A2A44;--blue-mid:#1E3A5F;--blue-light:#162338;
  --amber:#F59E0B;--amber-bg:#281F00;--amber-mid:#3D2E00;
  --green:#22C55E;--green-bg:#0C2416;--green-mid:#14391F;
  --red:#F87171;--red-bg:#280C0C;--red-mid:#3D1010;
  --purple:#A78BFA;--purple-bg:#1C1038;--purple-mid:#2D1A5C;
}}
@media(prefers-color-scheme:dark){html:not(.light) *{font-weight:400}}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Topbar */
#topbar-wrap{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:box-shadow 0.2s}
#topbar-wrap.scrolled{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.topbar{display:flex;align-items:center;justify-content:space-between;max-width:1180px;margin:0 auto;padding:0 1.5rem;height:var(--topbar-h);flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:11px}
.brand-icon{height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon img{height:46px;width:auto;display:block;object-fit:contain}
.brand-icon svg{width:42px;height:42px;display:block}
html.dark .brand-icon img{background:#fff;border-radius:6px;padding:3px 6px}
.brand-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;color:var(--brand-black);letter-spacing:-0.3px;text-transform:uppercase}
.brand-text .b-red{color:var(--accent)}
.brand-sub{font-size:11px;color:var(--text3);font-weight:500;margin-top:2px;letter-spacing:0.3px}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(0.97)}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn.primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);box-shadow:0 1px 4px rgba(227,6,19,0.25);font-weight:600}
.btn.primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);box-shadow:0 3px 10px rgba(227,6,19,0.32)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--surface2)}
.btn.active{background:var(--surface);border-color:var(--border2);box-shadow:inset 0 1px 2px rgba(0,0,0,0.06)}
.view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:3px;gap:2px}
.view-toggle .btn{padding:5px 12px;border:none;background:transparent;border-radius:8px;font-size:12px}
.view-toggle .btn.active{background:var(--surface);box-shadow:var(--shadow)}

/* Main content */
#app{max-width:1180px;margin:0 auto;padding:2rem 1.5rem}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s}
.metric:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.metric-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.metric.m-total .metric-accent{background:linear-gradient(90deg,#E30613 0%,#1A1A1A 100%)}
.metric.m-stages .metric-accent{background:linear-gradient(90deg,#3B82F6 0%,#7C3AED 100%)}
.metric.m-today .metric-accent{background:linear-gradient(90deg,#F59E0B 0%,#EF4444 100%)}
.metric.m-pipeline .metric-accent{background:linear-gradient(90deg,#16A34A 0%,#0D9488 100%)}
.metric-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.metric-icon svg{width:16px;height:16px}
.mi-total{background:var(--surface2);color:var(--text2)}
.mi-stages{background:var(--blue-bg);color:var(--blue)}
.mi-today{background:var(--amber-bg);color:var(--amber)}
.mi-pipeline{background:var(--green-bg);color:var(--green)}
.metric-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px}
.metric-value{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:var(--text);line-height:1;margin-bottom:3px}
.metric-value.sm{font-size:17px;padding-top:4px}
.metric-sub{font-size:12px;color:var(--text3)}

/* Alert */
.alert{display:flex;align-items:center;gap:10px;background:var(--amber-bg);border:1px solid var(--amber-mid);border-radius:var(--radius);padding:11px 15px;margin-bottom:1.25rem;font-size:13px;color:var(--amber);font-weight:500;animation:slideDown 0.2s ease}
.alert svg{width:16px;height:16px;flex-shrink:0}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text3);pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 35px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color 0.15s,box-shadow 0.15s;box-shadow:var(--shadow)}
.search-wrap input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light)}
.filters select{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);cursor:pointer;box-shadow:var(--shadow);transition:border-color 0.15s}
.filters select:focus{outline:none;border-color:var(--blue)}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
@media(max-width:700px){.kanban{grid-template-columns:1fr}}
.col{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:14px;min-height:300px}
.col-lead{border-top:3px solid var(--blue)}
.col-contato{border-top:3px solid var(--amber)}
.col-quali{border-top:3px solid var(--green)}
.col-reuniao{border-top:3px solid var(--purple)}
.col-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-lead{background:var(--blue)}
.dot-contato{background:var(--amber)}
.dot-quali{background:var(--green)}
.dot-reuniao{background:var(--purple)}
.col-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.col-count{font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px 9px;color:var(--text2)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.18s;box-shadow:var(--shadow)}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card:active{transform:translateY(0);box-shadow:var(--shadow)}
.card:last-child{margin-bottom:0}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:0.3px}
.av-blue{background:var(--blue-bg);color:var(--blue)}
.av-amber{background:var(--amber-bg);color:var(--amber)}
.av-green{background:var(--green-bg);color:var(--green)}
.av-purple{background:var(--purple-bg);color:var(--purple)}
.av-red{background:var(--red-bg);color:var(--red)}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-empresa{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-divider{height:1px;background:var(--border);margin:10px 0}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
.card-val{font-size:12px;font-weight:600;color:var(--text2)}
.date-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px}
.date-ok{background:var(--green-bg);color:var(--green)}
.date-today{background:var(--amber-bg);color:var(--amber)}
.date-late{background:var(--red-bg);color:var(--red)}
.date-none{color:var(--text3);font-size:11px}
.move-btns{display:flex;gap:4px;margin-top:10px}
.move-btn{font-size:11px;font-weight:500;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:3px}
.move-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.card[draggable="true"]{cursor:grab}
.card[draggable="true"]:active{cursor:grabbing}
.card.dragging{opacity:0.4;transform:rotate(-2deg) scale(0.98);box-shadow:0 12px 30px rgba(227,6,19,0.25)}
.col.col-drop{background:rgba(227,6,19,0.06);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset;transition:all 0.12s}
.col.col-drop .col-head{border-bottom-color:var(--accent)}
.empty-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1rem;color:var(--text3)}
.empty-col svg{width:28px;height:28px;margin-bottom:8px;opacity:0.35}
.empty-col span{font-size:13px}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--surface2)}
th{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background 0.12s;cursor:pointer}
tbody tr:hover td{background:var(--surface2)}
.td-name{font-weight:600}
.td-company{color:var(--text2)}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:5px}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-lead{background:var(--blue-bg);color:var(--blue)}
.badge-lead::before{background:var(--blue)}
.badge-contato{background:var(--amber-bg);color:var(--amber)}
.badge-contato::before{background:var(--amber)}
.badge-quali{background:var(--green-bg);color:var(--green)}
.badge-quali::before{background:var(--green)}
.badge-reuniao{background:var(--purple-bg);color:var(--purple)}
.badge-reuniao::before{background:var(--purple)}
.badge.dyn{background:var(--c-bg);color:var(--c)}
.badge.dyn::before{background:var(--c)}
.td-hist{font-size:12px;color:var(--text3)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem;animation:fadeIn 0.18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius-xl);padding:0;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:slideUp 0.22s cubic-bezier(0.34,1.2,0.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(18px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-top{padding:22px 24px 0;border-bottom:1px solid var(--border)}
.modal-top h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:14px;letter-spacing:-0.3px}
.tabs{display:flex;gap:0}
.tab{padding:9px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.modal-body{padding:22px 24px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 13px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);transition:border-color 0.15s,box-shadow 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px var(--blue-light)}
.field textarea{height:76px;resize:vertical}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.modal-row{grid-template-columns:1fr}}
.modal-footer{display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border);justify-content:flex-end;background:var(--surface2);border-radius:0 0 var(--radius-xl) var(--radius-xl)}
.del-btn{margin-right:auto;color:var(--red);border-color:var(--red-mid);background:transparent}
.del-btn:hover{background:var(--red-bg)}

/* History */
.hist-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.hist-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;transition:border-color 0.15s}
.hist-item:hover{border-color:var(--border2)}
.hist-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.hist-date{font-size:11px;color:var(--text3);margin-left:auto}
.hist-del{font-size:11px;color:var(--red);cursor:pointer;border:none;background:none;font-family:inherit;padding:0;font-weight:500;opacity:0.7}
.hist-del:hover{opacity:1;text-decoration:underline}
.hist-texto{font-size:13px;color:var(--text);line-height:1.55}
.hist-add{border-top:1px solid var(--border);padding-top:16px;margin-top:4px}
.hist-add textarea{width:100%;padding:9px 13px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);height:68px;resize:vertical;margin-bottom:10px;transition:border-color 0.15s,box-shadow 0.15s}
.hist-add textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light)}
.hist-add-row{display:flex;gap:8px}
.hist-add-row select{flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.htag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.ht-ligacao{background:var(--blue-bg);color:var(--blue)}
.ht-email{background:var(--green-bg);color:var(--green)}
.ht-reuniao{background:var(--purple-bg);color:var(--purple)}
.ht-nota{background:var(--surface2);color:var(--text2)}

@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:10px;padding:14px 22px;border-radius:var(--radius-lg);font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.22);animation:toastIn 0.3s cubic-bezier(0.34,1.2,0.64,1);pointer-events:none;white-space:nowrap}
.toast.success{background:#16A34A;color:#fff}
.toast.error{background:#DC2626;color:#fff}
.toast.hide{animation:toastOut 0.25s ease forwards}
.toast svg{width:16px;height:16px;flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-16px) scale(0.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-10px)}}

/* Empty states */
.empty{display:flex;flex-direction:column;align-items:center;padding:3rem;color:var(--text3)}
.empty svg{width:36px;height:36px;margin-bottom:12px;opacity:0.3}
.empty span{font-size:13px}

/* Login screen */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:26px}
.login-brand .brand-icon{width:64px;height:64px}
.login-brand .brand-icon svg{width:64px;height:64px}
.login-brand .brand-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.3px;text-transform:uppercase;color:var(--brand-black)}
.login-brand .brand-text .b-red{color:var(--accent)}
.login-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:22px;text-align:center}
.login-err{background:var(--red-bg);border:1px solid var(--red-mid);color:var(--red);padding:10px 12px;border-radius:var(--radius);font-size:12px;margin-bottom:14px}

.stage-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;background:var(--surface);transition:all 0.15s}
.stage-row:hover{border-color:var(--border2)}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px;box-shadow:var(--shadow)}

/* === V2: Sidebar layout === */
body{display:block}

.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:var(--accent-fg);font-weight:600;box-shadow:0 2px 8px rgba(227,6,19,0.25)}

.s-user-av{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;text-transform:uppercase}
.s-user-info{flex:1;min-width:0;line-height:1.3}

/* Main content */
#main-content{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh;width:calc(100% - 240px)}

<script>
const DEFAULT_STAGES=[
  {name:'Lead',short:'Lead',color:'#2563EB'},
  {name:'Contato feito',short:'Contato',color:'#D97706'},
  {name:'Qualificação',short:'Qualif.',color:'#16A34A'},
  {name:'Reunião Agendada',short:'Reunião',color:'#7C3AED'}
];
let stagesConfig=JSON.parse(JSON.stringify(DEFAULT_STAGES));
let STAGES=stagesConfig.map(s=>s.name);
function refreshStages(){STAGES=stagesConfig.map(s=>s.name)}
function stageObj(name){return stagesConfig.find(s=>s.name===name)||DEFAULT_STAGES[0]}
function stageColor(name){return stageObj(name).color}
function stageShort(name){return (stagesConfig.find(s=>s.name===name)||{short:name}).short}
function hex2rgba(hex,a){if(!hex||hex[0]!=='#')return`rgba(120,113,108,${a})`;const n=parseInt(hex.slice(1),16);return`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`}
function badgeStyle(name){const c=stageColor(name);return`background:${hex2rgba(c,0.12)};color:${c}`}
function dotStyle(name){return`background:${stageColor(name)}`}
const TIPOS=['Nota','Ligação','E-mail','Reunião'];
const TIPO_CLS={'Ligação':'ht-ligacao','E-mail':'ht-email','Reunião':'ht-reuniao','Nota':'ht-nota'};
const AV_COLORS=['av-blue','av-amber','av-green','av-purple','av-red'];

// Supabase config
const SB_URL='https://bubdoqvlsodiidhcarey.supabase.co';
const SB_KEY='sb_publishable_4p4W83oDOtlSNRJUj16TFA_Ptve7SPv';
const SB_API=`${SB_URL}/rest/v1/prospects`;
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'crm_auth'}});
let session=null;
function sbHdr(extra){
  const tok=session?.access_token||SB_KEY;
  return {'apikey':SB_KEY,'Authorization':`Bearer ${tok}`,'Content-Type':'application/json',...(extra||{})};
}

async function dbFetch(){
  try{
    const r=await fetch(`${SB_API}?select=*`,{headers:sbHdr()});
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    const rows=data.map(p=>({...p,historico:Array.isArray(p.historico)?p.historico:[]}));
    localStorage.setItem('crm_v2',JSON.stringify(rows));
    return rows;
  }catch(e){
    console.warn('Supabase offline, usando cache local:',e.message);
    try{return JSON.parse(localStorage.getItem('crm_v2')||'[]')}catch{return[]}
  }
}
async function dbUpsert(prospect){
  const r=await fetch(SB_API,{method:'POST',headers:sbHdr({'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify({...prospect,valor:prospect.valor===''||prospect.valor===null?null:Number(prospect.valor)||null})});
  if(!r.ok)throw new Error(await r.text());
}
async function dbPatch(id,data){
  const r=await fetch(`${SB_API}?id=eq.${encodeURIComponent(id)}`,{method:'PATCH',headers:sbHdr({'Prefer':'return=minimal'}),body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
}
async function dbDelete(id){
  const r=await fetch(`${SB_API}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:sbHdr()});
  if(!r.ok)throw new Error(await r.text());
}
async function loadStagesConfig(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/crm_config?key=eq.stages&select=value`,{headers:sbHdr()});
    if(r.ok){
      const data=await r.json();
      if(Array.isArray(data[0]?.value)&&data[0].value.length){
        stagesConfig=data[0].value;refreshStages();
        localStorage.setItem('crm_stages_v1',JSON.stringify(stagesConfig));
      }
    }
  }catch(e){
    try{const c=JSON.parse(localStorage.getItem('crm_stages_v1')||'null');if(Array.isArray(c)&&c.length){stagesConfig=c;refreshStages()}}catch{}
  }
}
async function saveStagesConfig(){
  const r=await fetch(`${SB_URL}/rest/v1/crm_config`,{
    method:'POST',
    headers:sbHdr({'Prefer':'resolution=merge-duplicates,return=minimal'}),
    body:JSON.stringify({key:'stages',value:stagesConfig,updated_at:new Date().toISOString()})
  });
  if(!r.ok)throw new Error(await r.text());
  localStorage.setItem('crm_stages_v1',JSON.stringify(stagesConfig));
}

async function doLogin(ev){
  ev.preventDefault();
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  err.style.display='none';btn.disabled=true;btn.textContent='Entrando...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent=error.message;err.style.display='block';btn.disabled=false;btn.textContent='Entrar';return false}
  session=data.session;
  showApp();
  return false;
}
function openProfile(){
  const email=session?.user?.email||'';
  const ov=document.createElement('div');
  ov.id='profile-overlay';ov.className='overlay';
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
  ov.innerHTML=`<div class="modal" style="width:420px" onclick="event.stopPropagation()">
    <div class="modal-top">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2>Meu perfil</h2>
        <button class="btn ghost" style="padding:6px" onclick="document.getElementById('profile-overlay').remove()">${ICONS.close}</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="field"><label>E-mail</label><input type="email" value="${esc(email)}" disabled style="opacity:0.7;cursor:not-allowed"></div>
      <div style="border-top:1px solid var(--border);margin:14px 0;padding-top:14px">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">Trocar senha</div>
        <div id="prof-err" style="display:none" class="login-err"></div>
        <div id="prof-ok" style="display:none;background:var(--green-bg);border:1px solid var(--green-mid);color:var(--green);padding:10px 12px;border-radius:var(--radius);font-size:12px;margin-bottom:14px">Senha alterada com sucesso</div>
        <div class="field"><label>Nova senha</label><input id="new-pwd" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
        <div class="field"><label>Confirmar nova senha</label><input id="new-pwd2" type="password" autocomplete="new-password"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="document.getElementById('profile-overlay').remove()">Fechar</button>
      <button class="btn primary" id="prof-save" onclick="changePassword()">Salvar nova senha</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}
async function changePassword(){
  const p1=document.getElementById('new-pwd').value;
  const p2=document.getElementById('new-pwd2').value;
  const err=document.getElementById('prof-err');
  const ok=document.getElementById('prof-ok');
  const btn=document.getElementById('prof-save');
  err.style.display='none';ok.style.display='none';
  if(p1.length<6){err.textContent='Senha deve ter no mínimo 6 caracteres';err.style.display='block';return}
  if(p1!==p2){err.textContent='As senhas não coincidem';err.style.display='block';return}
  btn.disabled=true;btn.textContent='Salvando...';
  const {error}=await sb.auth.updateUser({password:p1});
  btn.disabled=false;btn.textContent='Salvar nova senha';
  if(error){err.textContent=error.message;err.style.display='block';return}
  ok.style.display='block';
  document.getElementById('new-pwd').value='';
  document.getElementById('new-pwd2').value='';
  toast('Senha alterada com sucesso');
}
async function doLogout(){
  await sb.auth.signOut();
  session=null;
  prospects=[];
  localStorage.removeItem('crm_v2');
  showLogin();
}
function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-shell').style.display='none';
  document.getElementById('app').innerHTML='';
}
async function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  await init();
}
function toggleSidebar(force){
  const sb=document.getElementById('sidebar');
  const bd=document.getElementById('sidebar-backdrop');
  const open=force===undefined?!sb.classList.contains('open'):force;
  sb.classList.toggle('open',open);
  bd.classList.toggle('open',open);
}

let prospects=[],view='kanban',modal=null,editId=null,modalTab='dados';
let newHistTxt='',newHistTipo='Nota',filterSearch='',filterStage='';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmt(v){if(!v||isNaN(v))return'—';return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return null;const[y,m,dd]=d.split('-');return`${dd}/${m}`}
function fmtDateFull(d){if(!d)return null;const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function dateStatus(d){if(!d)return'none';const t=today();if(d<t)return'late';if(d===t)return'today';return'ok'}
function dateLabel(d){if(!d)return null;const s=dateStatus(d);if(s==='late')return'Atrasado '+fmtDate(d);if(s==='today')return'Hoje';return fmtDate(d)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function initials(nome){const p=(nome||'').trim().split(' ');return(p[0]?.[0]||'')+(p[1]?.[0]||'').toUpperCase()||'?'}
function avColor(id){const h=id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);return AV_COLORS[h%AV_COLORS.length]}

function openNew(){editId=null;modalTab='dados';modal={nome:'',empresa:'',contato:'',email:'',telefone:'',valor:'',stage:STAGES[0]||'Lead',notas:'',proximoContato:'',horaContato:'',historico:[]};newHistTxt='';newHistTipo='Nota';renderModal()}
function openEdit(id){const p=prospects.find(x=>x.id===id);if(!p)return;editId=id;modalTab='dados';modal=JSON.parse(JSON.stringify(p));newHistTxt='';newHistTipo='Nota';renderModal()}
function closeModal(){modal=null;editId=null;const ov=document.getElementById('modal-overlay');if(ov)ov.remove()}
async function saveModal(){
  if(!modal.nome.trim()){alert('Nome é obrigatório');return}
  const record={...modal,id:editId||uid(),criadoEm:modal.criadoEm||today()};
  try{
    await dbUpsert(record);
    if(editId){prospects=prospects.map(p=>p.id===editId?record:p)}else{prospects=[...prospects,record]}
    localStorage.setItem('crm_v2',JSON.stringify(prospects));
    closeModal();renderFull();toast('Prospect salvo com sucesso');
  }catch(e){toast('Erro ao salvar: '+e.message,'error')}
}
async function deleteProspect(){
  if(!editId)return;
  if(!confirm('Excluir este prospect?'))return;
  try{
    await dbDelete(editId);
    prospects=prospects.filter(p=>p.id!==editId);
    localStorage.setItem('crm_v2',JSON.stringify(prospects));
    closeModal();renderFull();toast('Prospect excluído');
  }catch(e){toast('Erro ao excluir: '+e.message,'error')}
}
async function moveToStage(id,newStage){
  const p=prospects.find(x=>x.id===id);if(!p||p.stage===newStage)return;
  const oldStage=p.stage;
  prospects=prospects.map(x=>x.id===id?{...x,stage:newStage}:x);
  renderContent();
  try{
    await dbPatch(id,{stage:newStage});
    localStorage.setItem('crm_v2',JSON.stringify(prospects));
  }catch(e){
    prospects=prospects.map(x=>x.id===id?{...x,stage:oldStage}:x);
    renderContent();toast('Erro ao mover: '+e.message,'error');
  }
}
async function moveStage(id,dir,e){
  if(e)e.stopPropagation();
  const p=prospects.find(x=>x.id===id);if(!p)return;
  const i=STAGES.indexOf(p.stage);const ni=i+dir;
  if(ni<0||ni>=STAGES.length)return;
  await moveToStage(id,STAGES[ni]);
}
let dragId=null;
function dragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{const el=document.querySelector(`[data-card-id="${id}"]`);if(el)el.classList.add('dragging')},0);
}
function dragEnd(){
  document.querySelectorAll('.card.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.col.col-drop').forEach(el=>el.classList.remove('col-drop'));
  dragId=null;
}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function dragEnter(e){e.currentTarget.classList.add('col-drop')}
function dragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('col-drop')}
function dropOnCol(e,stage){
  e.preventDefault();
  e.currentTarget.classList.remove('col-drop');
  const id=dragId||e.dataTransfer.getData('text/plain');
  if(id)moveToStage(id,stage);
}
function setField(k,v){modal={...modal,[k]:v}}
function setView(v){view=v;renderTopbar();renderContent()}
function setTab(t){modalTab=t;renderModal()}
function addHist(){if(!newHistTxt.trim())return;const h={id:uid(),data:today(),tipo:newHistTipo,texto:newHistTxt.trim()};modal.historico=[h,...(modal.historico||[])];newHistTxt='';renderModal()}
function delHist(hid){modal.historico=(modal.historico||[]).filter(h=>h.id!==hid);renderModal()}
function pad2(n){return String(n).padStart(2,'0')}
function buildICS(p){
  if(!p.proximoContato)return null;
  const [Y,M,D]=p.proximoContato.split('-');
  const now=new Date();
  const dtStamp=`${now.getUTCFullYear()}${pad2(now.getUTCMonth()+1)}${pad2(now.getUTCDate())}T${pad2(now.getUTCHours())}${pad2(now.getUTCMinutes())}${pad2(now.getUTCSeconds())}Z`;
  const hora=(p.horaContato||'').trim();
  let dtLines;
  if(/^\d{2}:\d{2}$/.test(hora)){
    const [h,m]=hora.split(':');
    const start=new Date(+Y,+M-1,+D,+h,+m);
    const end=new Date(start.getTime()+60*60*1000);
    const fmt=d=>`${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}T${pad2(d.getHours())}${pad2(d.getMinutes())}00`;
    dtLines=`DTSTART:${fmt(start)}\r\nDTEND:${fmt(end)}`;
  } else {
    const next=new Date(+Y,+M-1,+D);next.setDate(next.getDate()+1);
    const fmtD=d=>`${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`;
    dtLines=`DTSTART;VALUE=DATE:${Y}${M}${D}\r\nDTEND;VALUE=DATE:${fmtD(next)}`;
  }
  const escIcs=s=>String(s||'').replace(/\\/g,'\\\\').replace(/[\n\r]+/g,'\\n').replace(/[,;]/g,m=>'\\'+m);
  const summary=escIcs(`Reunião — ${p.empresa||p.nome||'Prospect'}`);
  const descParts=[];
  if(p.nome)descParts.push(`Contato: ${p.nome}`);
  if(p.contato)descParts.push(`Cargo: ${p.contato}`);
  if(p.email)descParts.push(`E-mail: ${p.email}`);
  if(p.telefone)descParts.push(`Telefone: ${p.telefone}`);
  if(p.valor)descParts.push(`Valor estimado: R$ ${Number(p.valor).toLocaleString('pt-BR')}`);
  if(p.notas)descParts.push('',p.notas);
  const description=escIcs(descParts.join('\n'));
  const location=escIcs(p.empresa||'');
  const uid=`${p.id||uid()}@cetem-crm`;
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CETEM Automacao//CRM Prospeccao//PT',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH','BEGIN:VEVENT',
    `UID:${uid}`,`DTSTAMP:${dtStamp}`,dtLines,
    `SUMMARY:${summary}`,`DESCRIPTION:${description}`,`LOCATION:${location}`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
}
function openOutlookEvent(){
  const p=modal;
  if(!p.proximoContato){toast('Defina uma data em "Próximo contato" antes','error');return}
  const [Y,M,D]=p.proximoContato.split('-');
  const hora=(p.horaContato||'').trim();
  let startISO,endISO;
  if(/^\d{2}:\d{2}$/.test(hora)){
    const [h,m]=hora.split(':');
    const start=new Date(+Y,+M-1,+D,+h,+m);
    const end=new Date(start.getTime()+60*60*1000);
    const fmt=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}:00`;
    startISO=fmt(start);endISO=fmt(end);
  } else {
    startISO=`${Y}-${M}-${D}T09:00:00`;
    endISO=`${Y}-${M}-${D}T10:00:00`;
  }
  const subject=`Reunião — ${p.empresa||p.nome||'Prospect'}`;
  const bodyParts=[];
  if(p.nome)bodyParts.push(`Contato: ${p.nome}`);
  if(p.contato)bodyParts.push(`Cargo: ${p.contato}`);
  if(p.telefone)bodyParts.push(`Telefone: ${p.telefone}`);
  if(p.email)bodyParts.push(`E-mail: ${p.email}`);
  if(p.valor)bodyParts.push(`Valor estimado: R$ ${Number(p.valor).toLocaleString('pt-BR')}`);
  if(p.notas)bodyParts.push('','Notas:',p.notas);
  const body=bodyParts.join('\n');
  const params=new URLSearchParams({
    path:'/calendar/action/compose',
    rru:'addevent',
    subject,
    body,
    startdt:startISO,
    enddt:endISO,
    location:p.empresa||'',
    allday:'false'
  });
  if(p.email)params.append('to',p.email);
  const url=`https://outlook.office.com/calendar/0/deeplink/compose?${params.toString()}`;
  window.open(url,'_blank','noopener');
}

function toast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  const icon=type==='success'
    ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  t.innerHTML=icon+msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.classList.add('hide');setTimeout(()=>t.remove(),250)},4000);
}

// Theme toggle
let theme=localStorage.getItem('crm_theme')||'auto';
function applyTheme(){
  const prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const isDark=theme==='dark'||(theme==='auto'&&prefersDark);
  document.documentElement.classList.toggle('dark',isDark);
  document.documentElement.classList.toggle('light',theme==='light');
}
function toggleTheme(){
  const prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const isDark=theme==='dark'||(theme==='auto'&&prefersDark);
  theme=isDark?'light':'dark';
  localStorage.setItem('crm_theme',theme);
  applyTheme();
  renderTopbar();
}

      ${settingsDirty?`<div style="margin-top:12px;padding:10px 12px;background:var(--amber-bg);border:1px solid var(--amber-mid);border-radius:var(--radius);color:var(--amber);font-size:12px">Mudanças não salvas — clique em <b>Salvar alterações</b> para aplicar a todos.</div>`:''}
    </div>`;
}
function updateStageField(i,field,val){editStages[i][field]=val;settingsDirty=true;renderSettings()}
function addStage(){
  const palette=['#0EA5E9','#F97316','#10B981','#8B5CF6','#EC4899','#14B8A6','#F59E0B','#6366F1'];
  const color=palette[editStages.length%palette.length];
  editStages.push({name:'Nova etapa',short:'Nova',color});
  settingsDirty=true;renderSettings();
}
function removeStage(i){
  if(editStages.length<=2){toast('Mínimo de 2 etapas','error');return}
  if(!confirm(`Remover etapa "${editStages[i].name}"? Prospects nessa etapa serão movidos para "${editStages[Math.max(0,i-1)].name}".`))return;
  editStages.splice(i,1);settingsDirty=true;renderSettings();
}
function resetStages(){
  if(!confirm('Restaurar etapas padrão? Mudanças não salvas serão perdidas.'))return;
  editStages=JSON.parse(JSON.stringify(DEFAULT_STAGES));settingsDirty=true;renderSettings();
}
function discardStageChanges(){
  editStages=JSON.parse(JSON.stringify(stagesConfig));settingsDirty=false;renderSettings();
}
async function commitStageChanges(){
  const names=editStages.map(s=>(s.name||'').trim());
  if(names.some(n=>!n)){toast('Todas as etapas precisam de nome','error');return}
  if(new Set(names).size!==names.length){toast('Não pode haver nomes de etapa repetidos','error');return}
  const oldNames=stagesConfig.map(s=>s.name);
  const newNames=editStages.map(s=>s.name);
  const mapped={};
  oldNames.forEach((n,i)=>{
    if(newNames.includes(n)){mapped[n]=n}
    else if(newNames[i]){mapped[n]=newNames[i]}
    else{mapped[n]=newNames[Math.max(0,Math.min(i,newNames.length-1))]}
  });
  const toUpdate=prospects.filter(p=>mapped[p.stage]&&mapped[p.stage]!==p.stage);
  try{
    stagesConfig=JSON.parse(JSON.stringify(editStages));refreshStages();
    await saveStagesConfig();
    for(const p of toUpdate){
      await dbPatch(p.id,{stage:mapped[p.stage]});
      p.stage=mapped[p.stage];
    }
    localStorage.setItem('crm_v2',JSON.stringify(prospects));
    settingsDirty=false;
    toast('Pipeline atualizado');
    renderSidebar();renderTopbar();renderSettings();
  }catch(e){toast('Erro ao salvar: '+e.message,'error')}
}
function stageDragStart(e,i){stageDragIdx=i;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function stageDragEnd(e){e.currentTarget.classList.remove('dragging');stageDragIdx=null}
function stageDrop(e,i){
  e.preventDefault();
  if(stageDragIdx==null||stageDragIdx===i)return;
  const item=editStages.splice(stageDragIdx,1)[0];
  editStages.splice(i,0,item);
  settingsDirty=true;stageDragIdx=null;renderSettings();
}
let dashCharts=[];
function renderDashboard(){
  const all=prospects;
  const totalVal=all.reduce((s,p)=>s+(Number(p.valor)||0),0);
  const avgVal=all.length?totalVal/all.length:0;
  const wonStage=STAGES[STAGES.length-1];
  const wonCount=all.filter(p=>p.stage===wonStage).length;
  const convRate=all.length?Math.round(wonCount/all.length*100):0;
  const stageCounts=STAGES.map(s=>all.filter(p=>p.stage===s).length);
  const stageVals=STAGES.map(s=>all.filter(p=>p.stage===s).reduce((sum,p)=>sum+(Number(p.valor)||0),0));
  const stageColors=stagesConfig.map(s=>s.color);
  const t=today();
  const in14=new Date(Date.now()+14*86400000).toISOString().slice(0,10);
  const upcoming=all.filter(p=>p.proximoContato&&p.proximoContato<=in14).sort((a,b)=>a.proximoContato.localeCompare(b.proximoContato));
  const isDark=document.documentElement.classList.contains('dark');
  const gridColor=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  const tickColor=isDark?'#9C968F':'#78716C';

  document.getElementById('app').innerHTML=`
    <div class="metrics">
      <div class="metric m-total"><div class="metric-accent"></div><div class="metric-icon mi-total">${ICONS.users}</div><div class="metric-label">Total</div><div class="metric-value">${all.length}</div><div class="metric-sub">prospects ativos</div></div>
      <div class="metric m-pipeline"><div class="metric-accent"></div><div class="metric-icon mi-pipeline">${ICONS.trending}</div><div class="metric-label">Pipeline</div><div class="metric-value sm">${fmt(totalVal)}</div><div class="metric-sub">valor total</div></div>
      <div class="metric m-stages"><div class="metric-accent"></div><div class="metric-icon mi-stages">${ICONS.layers}</div><div class="metric-label">Ticket médio</div><div class="metric-value sm">${fmt(avgVal)}</div><div class="metric-sub">por prospect</div></div>
      <div class="metric m-today"><div class="metric-accent"></div><div class="metric-icon mi-today">${ICONS.clock}</div><div class="metric-label">Conversão</div><div class="metric-value">${convRate}%</div><div class="metric-sub">→ ${wonStage}</div></div>
    </div>
    <div class="dash-grid">
      <div class="chart-card">
        <div class="chart-card-title">Funil de Conversão</div>
        <div class="chart-card-sub">Quantidade de prospects por etapa</div>
        <div class="chart-canvas-wrap"><canvas id="chart-funnel"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Pipeline por Etapa</div>
        <div class="chart-card-sub">Valor estimado em R$ acumulado</div>
        <div class="chart-canvas-wrap"><canvas id="chart-value"></canvas></div>
      </div>
    </div>
    <div class="chart-card" style="margin-top:14px">
      <div class="chart-card-title">Próximos Contatos</div>
      <div class="chart-card-sub">Atrasados, hoje e próximos 14 dias</div>
      <div id="upcoming-list" style="margin-top:6px">${upcoming.length?upcoming.map(p=>{
        const ds=dateStatus(p.proximoContato);
        const lbl=ds==='late'?'Atrasado':(ds==='today'?'Hoje':fmtDate(p.proximoContato));
        return `<div class="upcoming-row" onclick="openEdit('${p.id}')">
          <div class="upcoming-when ${ds==='late'?'late':(ds==='today'?'today':'')}">${lbl}${p.horaContato?'<br>'+p.horaContato:''}</div>
          <div class="upcoming-info"><div class="upcoming-name">${esc(p.nome)}</div><div class="upcoming-empresa">${esc(p.empresa)||'—'}</div></div>
          <span class="badge dyn" style="--c:${stageColor(p.stage)};--c-bg:${hex2rgba(stageColor(p.stage),0.12)}">${esc(p.stage)}</span>
        </div>`;
      }).join(''):'<div class="empty" style="padding:2rem"><span>Nenhum contato agendado nos próximos 14 dias</span></div>'}</div>
    </div>
  `;

  dashCharts.forEach(c=>{try{c.destroy()}catch{}});dashCharts=[];
  if(typeof Chart==='undefined')return;
  const commonOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1A1917',padding:10,cornerRadius:8}},scales:{x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11}}},y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11}},beginAtZero:true}}};
  setTimeout(()=>{
    const c1=document.getElementById('chart-funnel');
    if(c1)dashCharts.push(new Chart(c1,{type:'bar',data:{labels:STAGES,datasets:[{data:stageCounts,backgroundColor:stageColors,borderRadius:8,barThickness:42}]},options:{...commonOpts,indexAxis:'y',scales:{x:{...commonOpts.scales.x,ticks:{...commonOpts.scales.x.ticks,precision:0}},y:{...commonOpts.scales.y,grid:{display:false}}}}}));
    const c2=document.getElementById('chart-value');
    if(c2)dashCharts.push(new Chart(c2,{type:'bar',data:{labels:STAGES.map(s=>stageShort(s)),datasets:[{data:stageVals,backgroundColor:stageColors,borderRadius:8,barThickness:42}]},options:{...commonOpts,scales:{x:{...commonOpts.scales.x,grid:{display:false}},y:{...commonOpts.scales.y,ticks:{...commonOpts.scales.y.ticks,callback:v=>'R$ '+(v>=1000?(v/1000).toFixed(0)+'k':v)}}}}}));
  },30);
}

function renderContent(){
  const area=document.getElementById('content-area');
  if(!area)return;
  const vis=filtered();
  let html='';
  if(view==='kanban'){
    html+=`<div class="kanban">`;
    STAGES.forEach((stage,si)=>{
      const cards=vis.filter(p=>p.stage===stage);
      html+=`<div class="col" style="border-top:3px solid ${stageColor(stage)}" ondragover="dragOver(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="dropOnCol(event,'${stage.replace(/'/g,"\\'")}')">
        <div class="col-head">
          <span class="col-dot" style="${dotStyle(stage)}"></span>
          <span class="col-name">${esc(stage)}</span>
          <span class="col-count">${cards.length}</span>
        </div>`;
      if(!cards.length){
        html+=`<div class="empty-col">${ICONS.empty}<span>Nenhum prospect</span></div>`;
      } else {
        cards.forEach(p=>{
          const ds=dateStatus(p.proximoContato);
          const dl=dateLabel(p.proximoContato);
          const av=avColor(p.id);
          const hl=(p.historico||[]).length;
          html+=`<div class="card" data-card-id="${p.id}" draggable="true" ondragstart="dragStart(event,'${p.id}')" ondragend="dragEnd(event)" onclick="openEdit('${p.id}')">
            <div class="card-header">
              <div class="card-avatar ${av}">${esc(initials(p.nome))}</div>
              <div class="card-info">
                <div class="card-name">${esc(p.nome)}</div>
                <div class="card-empresa">${esc(p.empresa)||'—'}</div>
              </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-footer">
              <span class="card-val">${fmt(p.valor)}</span>
              ${dl?`<span class="date-badge date-${ds}">${esc(dl)}</span>`:`<span class="date-none">Sem data</span>`}
            </div>
            ${hl?`<div style="margin-top:8px;font-size:11px;color:var(--text3)">${hl} interaç${hl>1?'ões':'ão'}</div>`:''}
            <div class="move-btns" onclick="event.stopPropagation()">
              ${si>0?`<button class="move-btn" onclick="moveStage('${p.id}',-1,event)">${ICONS.arrowL} ${esc(stageShort(STAGES[si-1]))}</button>`:''}
              ${si<STAGES.length-1?`<button class="move-btn" onclick="moveStage('${p.id}',1,event)">${esc(stageShort(STAGES[si+1]))} ${ICONS.arrowR}</button>`:''}
            </div>
          </div>`;
        });
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="table-wrap"><table>
      <thead><tr>
        <th>Nome</th><th>Empresa</th><th>Etapa</th><th>Valor</th><th>Próximo contato</th><th>Histórico</th><th>Mover</th>
      </tr></thead><tbody>`;
    if(!vis.length){
      html+=`<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text3)">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">${ICONS.empty}<span>Nenhum prospect encontrado</span></div>
      </td></tr>`;
    } else {
      vis.forEach(p=>{
        const si=STAGES.indexOf(p.stage);
        const ds=dateStatus(p.proximoContato);
        const dl=dateLabel(p.proximoContato);
        const hl=(p.historico||[]).length;
        html+=`<tr onclick="openEdit('${p.id}')">
          <td><div style="display:flex;align-items:center;gap:9px">
            <div class="card-avatar ${avColor(p.id)}" style="width:30px;height:30px;font-size:11px;border-radius:8px">${esc(initials(p.nome))}</div>
            <span class="td-name">${esc(p.nome)}</span>
          </div></td>
          <td class="td-company">${esc(p.empresa)||'—'}</td>
          <td><span class="badge dyn" style="--c:${stageColor(p.stage)};--c-bg:${hex2rgba(stageColor(p.stage),0.12)}">${esc(p.stage)}</span></td>
          <td style="font-weight:500">${fmt(p.valor)}</td>
          <td>${dl?`<span class="date-badge date-${ds}">${esc(dl)}</span>`:`<span style="color:var(--text3);font-size:12px">—</span>`}</td>
          <td class="td-hist">${hl?`${hl} registro${hl>1?'s':''}`:'—'}</td>
          <td onclick="event.stopPropagation()">
            <div class="move-btns" style="margin-top:0">
              ${si>0?`<button class="move-btn" onclick="moveStage('${p.id}',-1,event)">${ICONS.arrowL}</button>`:''}
              ${si<STAGES.length-1?`<button class="move-btn" onclick="moveStage('${p.id}',1,event)">${ICONS.arrowR}</button>`:''}
            </div>
          </td>
        </tr>`;
      });
    }
    html+=`</tbody></table></div>`;
  }
  area.innerHTML=html;
}

function renderModal(){
  let ov=document.getElementById('modal-overlay');
  if(!modal){if(ov)ov.remove();return}
  if(!ov){
    ov=document.createElement('div');
    ov.id='modal-overlay';
    ov.className='overlay';
    ov.addEventListener('click',closeModal);
    document.body.appendChild(ov);
  }
  const hl=(modal.historico||[]).length;
  let mhtml=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-top">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2>${editId?esc(modal.nome)||'Editar prospect':'Novo prospect'}</h2>
        <button class="btn ghost" style="padding:6px" onclick="closeModal()">${ICONS.close}</button>
      </div>
      <div class="tabs">
        <div class="tab${modalTab==='dados'?' active':''}" onclick="setTab('dados')">Dados</div>
        <div class="tab${modalTab==='hist'?' active':''}" onclick="setTab('hist')">Histórico${hl?` (${hl})`:''}</div>
      </div>
    </div>
    <div class="modal-body">`;

  if(modalTab==='dados'){
    mhtml+=`
      <div class="modal-row">
        <div class="field"><label>Nome *</label><input value="${esc(modal.nome)}" oninput="setField('nome',this.value)" placeholder="Nome do responsável"></div>
        <div class="field"><label>Empresa</label><input value="${esc(modal.empresa)}" oninput="setField('empresa',this.value)" placeholder="Razão social"></div>
      </div>
      <div class="modal-row">
        <div class="field"><label>Cargo</label><input value="${esc(modal.contato)}" oninput="setField('contato',this.value)" placeholder="Cargo ou função"></div>
        <div class="field"><label>Telefone</label><input value="${esc(modal.telefone)}" oninput="setField('telefone',this.value)" placeholder="(xx) xxxxx-xxxx"></div>
      </div>
      <div class="modal-row">
        <div class="field"><label>E-mail</label><input value="${esc(modal.email)}" oninput="setField('email',this.value)" placeholder="email@empresa.com"></div>
        <div class="field"><label>Valor estimado (R$)</label><input type="number" value="${esc(modal.valor)}" oninput="setField('valor',this.value)" placeholder="0"></div>
      </div>
      <div class="modal-row">
        <div class="field"><label>Etapa</label><select oninput="setField('stage',this.value)">${STAGES.map(s=>`<option value="${s}"${modal.stage===s?' selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Próximo contato</label>
          <div style="display:flex;gap:6px">
            <input type="date" style="flex:2" value="${esc(modal.proximoContato)}" oninput="setField('proximoContato',this.value)">
            <input type="time" style="flex:1" value="${esc(modal.horaContato)}" oninput="setField('horaContato',this.value)" title="Hora (opcional)">
          </div>
        </div>
      </div>
      <div class="field"><label>Notas</label><textarea oninput="setField('notas',this.value)" placeholder="Observações, próximos passos...">${esc(modal.notas)}</textarea></div>`;
  } else {
    const hist=modal.historico||[];
    mhtml+=`<div class="hist-list">`;
    if(!hist.length)mhtml+=`<div class="empty">${ICONS.empty}<span>Nenhuma interação registrada</span></div>`;
    hist.forEach(h=>{
      mhtml+=`<div class="hist-item">
        <div class="hist-meta">
          <span class="htag ${TIPO_CLS[h.tipo]||'ht-nota'}">${h.tipo}</span>
          <span class="hist-date">${fmtDateFull(h.data)||h.data}</span>
          <button class="hist-del" onclick="delHist('${h.id}')">remover</button>
        </div>
        <div class="hist-texto">${esc(h.texto)}</div>
      </div>`;
    });
    mhtml+=`</div>
    <div class="hist-add">
      <textarea placeholder="Descreva a interação..." oninput="newHistTxt=this.value">${esc(newHistTxt)}</textarea>
      <div class="hist-add-row">
        <select onchange="newHistTipo=this.value">${TIPOS.map(t=>`<option value="${t}"${newHistTipo===t?' selected':''}>${t}</option>`).join('')}</select>
        <button class="btn primary" onclick="addHist()">${ICONS.plus} Registrar</button>
      </div>
    </div>`;
  }

  mhtml+=`</div>
    <div class="modal-footer">
      ${editId?`<button class="btn del-btn" onclick="deleteProspect()">${ICONS.trash} Excluir</button>`:''}
      ${modal.proximoContato?`<button class="btn" onclick="openOutlookEvent()" title="Abre o Outlook com o evento já preenchido">${ICONS.calendar} Agendar no Outlook</button>`:''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="saveModal()">Salvar</button>
    </div>
  </div>`;
  ov.innerHTML=mhtml;
}

async function init(){
  document.getElementById('app').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:40vh;gap:10px;color:var(--text3);font-size:14px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Carregando dados...</div>`;
  await loadStagesConfig();
  prospects=await dbFetch();
  renderFull();
}
async function bootstrap(){
  const {data}=await sb.auth.getSession();
  session=data.session||null;
  if(session){showApp()}else{showLogin()}
  sb.auth.onAuthStateChange((_e,s)=>{session=s||null});
}
bootstrap();
</script>
